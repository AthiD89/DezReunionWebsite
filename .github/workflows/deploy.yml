name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish DezReunionWebsite.csproj -c Release -o publish_output

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        run: |
          CLEAN_TOKEN=$(printf '%s' "$NETLIFY_AUTH_TOKEN" | tr -d '[:space:]')
          CLEAN_SITE=$(printf '%s' "$NETLIFY_SITE_ID" | tr -d '[:space:]')
          netlify deploy --prod --no-build --dir=publish_output/wwwroot --site="$CLEAN_SITE" --auth="$CLEAN_TOKEN"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
