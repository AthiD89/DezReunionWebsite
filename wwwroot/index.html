<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Dez Reunion Events - Celebrate. Connect. Dance. Join our community events, socials and reunions." />
    <title>Dez Reunion Events</title>

    <!-- Open Graph / social share preview. og:image is root-relative for now -
         swap to an absolute URL (https://yourdomain/...) once the production
         domain is confirmed, and ideally point it at a real event photo
         instead of the placeholder hero graphic. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Dez Reunion Events" />
    <meta property="og:title" content="Dez Reunion Events — Celebrate. Connect. Dance." />
    <meta property="og:description" content="Join our community events, socials and reunions in Cape Town." />
    <meta property="og:image" content="/images/hero-1.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dez Reunion Events — Celebrate. Connect. Dance." />
    <meta name="twitter:description" content="Join our community events, socials and reunions in Cape Town." />
    <meta name="twitter:image" content="/images/hero-1.svg" />
    <base href="/" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%88%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="DezReunionWebsite.styles.css" />
</head>

<body>
    <div id="app">
        <div class="wasm-loading">
            <span class="wasm-loading-mark">🌈</span>
            <p>Loading Dez Reunion Events…</p>
        </div>
    </div>

    <div id="blazor-error-ui" data-nosnippet>
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script id="tiktok-embed-script" async src="https://www.tiktok.com/embed.js"></script>
    <script>
        document.querySelector('#blazor-error-ui .dismiss').addEventListener('click', function () {
            document.getElementById('blazor-error-ui').style.display = 'none';
        });

        window.scrollToElement = function (id) {
            var el = document.getElementById(id);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth' });
            }
        };

        window.reloadTikTokEmbeds = function () {
            var existing = document.getElementById('tiktok-embed-script');
            if (existing) {
                existing.remove();
            }
            var script = document.createElement('script');
            script.id = 'tiktok-embed-script';
            script.async = true;
            script.src = 'https://www.tiktok.com/embed.js';
            document.body.appendChild(script);
        };
    </script>
</body>

</html>
